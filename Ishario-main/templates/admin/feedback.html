<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ishario • Admin • Feedback Management</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ishario: { primary:"#7C3AED", primaryLight:"#A78BFA", bg:"#F5F6FA" }
        },
        boxShadow: { soft:"0 8px 24px rgba(16,24,40,.06)" }
      }
    }
  }
</script>
</head>

<body class="bg-ishario-bg min-h-screen">

<!-- HEADER -->
<header class="bg-white shadow-sm">
  <div class="max-w-6xl mx-auto px-4 py-4 flex items-center gap-3">
    <a href="./admin.html" class="text-ishario-primary font-extrabold text-xl tracking-tight flex items-center gap-2">
      <span class="inline-block w-6 h-6 rounded-md bg-ishario-primary"></span> Ishario
    </a>
    <nav class="ml-auto flex items-center gap-4">
      <span class="text-xs px-2 py-1 rounded-full bg-purple-100 text-ishario-primary">Admin</span>
    </nav>
  </div>
</header>

<!-- MAIN -->
<main class="max-w-6xl mx-auto px-4 mt-8 mb-16">

  <div class="flex items-end justify-between flex-wrap gap-3">
    <div>
      <h1 class="text-2xl font-semibold">Feedback Management</h1>
      <p class="text-gray-500">View, review, respond, resolve, and manage user feedback.</p>
    </div>
    
  </div>

  <!-- FILTERS -->
  <section class="bg-white rounded-2xl p-4 shadow-soft mt-6">
    <div class="grid md:grid-cols-4 gap-3">
      <div>
        <label class="block text-sm text-gray-600">Search</label>
        <input id="q" type="text" class="w-full rounded-lg border px-3 py-2" placeholder="Name, email, message...">
      </div>

      <div>
        <label class="block text-sm text-gray-600">Category</label>
        <select id="fCategory" class="w-full rounded-lg border px-3 py-2">
          <option value="">All</option>
          <option value="bug">Bug Report</option>
          <option value="suggestion">Suggestion</option>
          <option value="general">General</option>
        </select>
      </div>

      <div>
        <label class="block text-sm text-gray-600">Status</label>
        <select id="fStatus" class="w-full rounded-lg border px-3 py-2">
          <option value="">All</option>
          <option value="pending">Pending</option>
          <option value="reviewed">Reviewed</option>
          <option value="resolved">Resolved</option>
        </select>
      </div>

      <div>
        <label class="block text-sm text-gray-600">Sort</label>
        <select id="fSort" class="w-full rounded-lg border px-3 py-2">
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
        </select>
      </div>
    </div>
    <div class="flex justify-between mt-3">
      <div class="text-xs text-gray-500">Use filters to narrow down results.</div>
      <button id="clearFilters" class="px-3 py-2 rounded-lg border hover:bg-gray-50">Clear</button>
    </div>
  </section>

  <!-- TABLE -->
  <section class="bg-white rounded-2xl p-0 shadow-soft mt-4 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="min-w-full">
        <thead class="bg-gray-50 text-gray-600 text-sm">
          <tr>
            <th class="px-4 py-3">User</th>
            <th class="px-4 py-3">Category</th>
            <th class="px-4 py-3">Rating</th>
            <th class="px-4 py-3">Message</th>
            <th class="px-4 py-3">Date</th>
            <th class="px-4 py-3">Status</th>
            <th class="px-4 py-3">Actions</th>
          </tr>
        </thead>
        <tbody id="tbody" class="text-sm"></tbody>
      </table>
    </div>

    <!-- pagination -->
    <div class="flex justify-between px-4 py-3 border-t">
      <div id="pageInfo" class="text-xs text-gray-500">—</div>
      <div class="flex gap-2">
        <button id="prevPage" class="px-3 py-1.5 border rounded-lg hover:bg-gray-50">Prev</button>
        <button id="nextPage" class="px-3 py-1.5 border rounded-lg hover:bg-gray-50">Next</button>
      </div>
    </div>
  </section>
</main>

<!-- VIEW FEEDBACK MODAL -->
<div id="viewModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-soft w-full max-w-lg p-6">
    <h2 class="text-xl font-semibold">Feedback Details</h2>
    <div id="viewContent" class="mt-4 text-sm"></div>

    <div class="flex justify-end mt-6 gap-3">
      <button onclick="closeView()" class="px-3 py-2 border rounded-lg hover:bg-gray-50">Close</button>
    </div>
  </div>
</div>

<!-- REPLY MODAL -->
<div id="replyModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-soft w-full max-w-lg p-6">
    <h2 class="text-xl font-semibold">Reply to User</h2>
    <textarea id="replyMsg" rows="4" class="w-full border rounded-lg px-3 py-2 mt-3" placeholder="Write your reply..."></textarea>

    <div class="flex justify-end mt-6 gap-3">
      <button onclick="closeReply()" class="px-3 py-2 border rounded-lg hover:bg-gray-50">Cancel</button>
      <button id="sendReply" class="px-3 py-2 bg-ishario-primary text-white rounded-lg hover:bg-purple-700">Send</button>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div id="confirmModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-soft w-full max-w-sm p-6">
    <h2 class="text-lg font-semibold">Are you sure?</h2>
    <p class="text-sm text-gray-600 mt-1">This feedback will be deleted permanently.</p>
    <div class="flex justify-end mt-6 gap-3">
      <button onclick="closeConfirm()" class="px-3 py-2 border rounded-lg">Cancel</button>
      <button id="confirmDeleteBtn" class="px-3 py-2 bg-red-600 text-white rounded-lg">Delete</button>
    </div>
  </div>
</div>

<script>
// ✅ Toast Helper
const toast = (msg, color="bg-purple-600") => {
  const t = document.createElement("div");
  t.className = `fixed bottom-6 right-6 ${color} text-white px-4 py-2 rounded-xl shadow-lg`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2000);
};

// ✅ Fetch Feedback Data from Backend
async function fetchFeedback() {
  try {
    const res = await fetch('/api/feedback'); // Ensure your backend provides this API
    const data = await res.json();
    if (data.feedback) {
      renderFeedback(data.feedback);
    }
  } catch (err) {
    console.error('Error fetching feedback:', err);
  }
}

// ✅ Render Feedback Table
function renderFeedback(feedback) {
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = feedback.map(f => `
    <tr class="border-t">
      <td class="px-4 py-3">${f.name}</td>
      <td class="px-4 py-3">${f.category}</td>
      <td class="px-4 py-3">${"⭐".repeat(f.rating)}</td>
      <td class="px-4 py-3">${f.message}</td>
      <td class="px-4 py-3">${f.date}</td>
      <td class="px-4 py-3">${f.status}</td>
      <td class="px-4 py-3">
        <button class="px-2 py-1 text-xs rounded-lg bg-purple-600 text-white hover:bg-purple-700" onclick="viewFeedback('${f.id}')">View</button>
        <button class="px-2 py-1 text-xs rounded-lg bg-green-600 text-white hover:bg-green-700" onclick="resolveFeedback('${f.id}')">Resolve</button>
        <button class="px-2 py-1 text-xs rounded-lg bg-red-600 text-white hover:bg-red-700" onclick="deleteFeedback('${f.id}')">Delete</button>
      </td>
    </tr>
  `).join('');
}

// ✅ View Feedback Modal
function viewFeedback(feedbackId) {
  // Fetch full feedback details from API or storage
  // Display details in modal
  const feedback = {}; // Replace with actual fetch from server
  document.getElementById("viewContent").innerHTML = `
    <p><strong>Name:</strong> ${feedback.name}</p>
    <p><strong>Email:</strong> ${feedback.email}</p>
    <p><strong>Category:</strong> ${feedback.category}</p>
    <p><strong>Rating:</strong> ${"⭐".repeat(feedback.rating)}</p>
    <p><strong>Message:</strong> ${feedback.message}</p>
    <p><strong>Reply:</strong> ${feedback.reply || "No reply yet"}</p>
  `;
  showModal("viewModal");
}

// ✅ Reply to Feedback
document.getElementById("sendReply").addEventListener("click", async () => {
  const replyMsg = document.getElementById("replyMsg").value;
  const feedbackId = selectedFeedback.id;

  // Send reply to backend
  const response = await fetch(`/api/feedback/${feedbackId}/reply`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ reply: replyMsg })
  });

  if (response.ok) {
    toast("Reply sent ✅", "bg-green-600");
    renderFeedback(await fetchFeedback()); // Reload feedback
  } else {
    toast("Error sending reply", "bg-red-600");
  }
});

// ✅ Resolve Feedback
function resolveFeedback(feedbackId) {
  fetch(`/api/feedback/${feedbackId}/resolve`, {
    method: 'POST'
  }).then(() => {
    toast("Feedback resolved ✅", "bg-green-600");
    fetchFeedback();
  });
}

// ✅ Delete Feedback
async function deleteFeedback(feedbackId) {
  const confirmation = confirm("Are you sure you want to delete this feedback?");
  if (confirmation) {
    await fetch(`/api/feedback/${feedbackId}`, { method: 'DELETE' });
    toast("Feedback deleted ❌", "bg-red-600");
    fetchFeedback();
  }
}

// ✅ Modal helpers
function showModal(id){
  const m=document.getElementById(id);
  m.classList.remove("hidden"); m.classList.add("flex");
}
function hideModal(id){
  const m=document.getElementById(id);
  m.classList.add("hidden"); m.classList.remove("flex");
}

// ✅ INIT
fetchFeedback();
</script>

</body>
</html>
