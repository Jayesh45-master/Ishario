<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ishario - Reset Password</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        /* General Reset and Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f0e6ff, #ffffff, #e6ffe6);
        }

        /* Gradient Text Style */
        .main-gradient-text {
            background-image: linear-gradient(90deg, #8a2be2, #cc66ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Gradient Button */
        .cta-gradient {
            background: linear-gradient(90deg, #8a2be2, #cc66ff);
        }

        /* Card Container */
        .auth-card {
            padding: 40px;
            border-radius: 16px;
            max-width: 450px;
            width: 90vw;
            background-color: white;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(0, 0, 0, 0.05);
        }

        /* Input Focus */
        input:focus {
            border-color: #8a2be2 !important;
            box-shadow: 0 0 0 1px #8a2be2 !important;
        }

        /* Error messages */
        .error-message {
            color: #e02424;
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }

        /* Alert box */
        .alert-box {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            background-color: #8a2be2;
            color: white;
            font-weight: 500;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 9999;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="flex flex-col items-center mb-6">
            <div class="w-16 h-16 bg-purple-100 text-purple-600 rounded-full flex items-center justify-center text-3xl mb-3">
                <i class="fas fa-key"></i>
            </div>
            <h3 class="text-3xl font-bold main-gradient-text">New Password</h3>
            <p class="text-sm text-gray-500 text-center">Set a strong new password for your account.</p>
        </div>

        <form id="resetForm">
            <!-- Hidden input for email -->
            <input type="hidden" id="email" value="{{ email }}">

            <label class="block text-sm font-medium text-gray-700 mb-1 mt-4">OTP</label>
            <input type="text" id="otp" placeholder="Enter OTP" class="w-full p-3 border border-gray-300 rounded-lg">
            <p id="otpError" class="error-message"></p>

            <label class="block text-sm font-medium text-gray-700 mb-1 mt-4">New Password</label>
            <input type="password" id="newPassword" placeholder="••••••••" class="w-full p-3 border border-gray-300 rounded-lg">
            <p class="text-xs text-gray-500 mt-1">Min 8 chars, 1 uppercase, 1 lowercase, 1 number, 1 special char</p>
            <p id="newPasswordError" class="error-message"></p>

            <label class="block text-sm font-medium text-gray-700 mb-1 mt-4">Confirm New Password</label>
            <input type="password" id="confirmNewPassword" placeholder="••••••••" class="w-full p-3 border border-gray-300 rounded-lg">
            <p id="confirmNewPasswordError" class="error-message"></p>

            <button type="submit" class="w-full mt-6 py-3 rounded-xl text-white font-semibold cta-gradient hover:opacity-90 transition duration-150">Set New Password</button>

            <p class="text-center text-sm text-gray-500 mt-4">
                Remembered it? 
                <button type="button" onclick="navigateToLogin()" class="text-purple-600 hover:underline">Go to Login</button>
            </p>
        </form>
    </div>

    <script>
        // Alert helper
        function showAlert(message) {
            const alertBox = document.createElement('div');
            alertBox.className = 'alert-box';
            alertBox.textContent = message;
            document.body.appendChild(alertBox);
            setTimeout(() => { alertBox.remove(); }, 3000);
        }

        const validatePassword = (password) => {
            if (password.length < 8) return "Password must be at least 8 characters long.";
            if (!/[A-Z]/.test(password)) return "Password must contain at least one capital letter.";
            if (!/[a-z]/.test(password)) return "Password must contain at least one lowercase letter.";
            if (!/\d/.test(password)) return "Password must contain at least one digit.";
            if (!/[!@#$%^&*(),.?\":{}|<>]/.test(password)) return "Password must contain at least one special character.";
            return null;
        };

        const displayError = (id, message) => {
            document.getElementById(id).textContent = message;
        };

        const navigateToLogin = () => { window.location.href = "/"; };

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const otp = document.getElementById('otp').value.trim();
            const newPassword = document.getElementById('newPassword').value;
            const confirmNewPassword = document.getElementById('confirmNewPassword').value;

            displayError('otpError', '');
            displayError('newPasswordError', '');
            displayError('confirmNewPasswordError', '');

            let isValid = true;

            if (!otp) { displayError('otpError', 'OTP is required'); isValid = false; }
            const passError = validatePassword(newPassword);
            if (passError) { displayError('newPasswordError', passError); isValid = false; }
            if (newPassword !== confirmNewPassword) { displayError('confirmNewPasswordError', 'Passwords do not match'); isValid = false; }

            if (!isValid) return;

            try {
                const response = await fetch('/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp, new_password: newPassword })
                });
                const data = await response.json();
                if (response.ok) {
                    showAlert(data.message);
                    setTimeout(() => { navigateToLogin(); }, 1500);
                } else {
                    showAlert(data.error || 'Something went wrong');
                }
            } catch (err) {
                showAlert('Network error. Please try again.');
            }
        });
    </script>

</body>
</html>
